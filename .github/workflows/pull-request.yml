name: Pull Request Validation

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      DATABASE_URL: postgresql://rashpod:rashpod@localhost:5432/rashpod?schema=public
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-for-ci-only
      WEB_URL: http://localhost:3000
      DASHBOARD_URL: http://localhost:3001
      NEXT_PUBLIC_API_URL: http://localhost:3002
      API_URL: http://localhost:3002
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secret scan
        run: node tools/ci/check-secrets.mjs

      - name: Migration safety
        run: node tools/ci/migration-safety.mjs

      - name: Prisma validate
        run: npx prisma validate --schema apps/rashpod-api/prisma/schema.prisma

      - name: Prisma generate
        run: npx prisma generate --schema apps/rashpod-api/prisma/schema.prisma

      - name: API TypeScript
        run: npx tsc --noEmit -p apps/rashpod-api/tsconfig.json

      - name: Worker TypeScript
        run: npx tsc --noEmit -p apps/rashpod-worker/tsconfig.json

      - name: Dashboard TypeScript
        run: npx tsc --noEmit -p apps/rashpod-dashboard/tsconfig.json

      - name: Storefront TypeScript
        run: npx tsc --noEmit -p apps/rashpod-web/tsconfig.json

      - name: Focused API tests
        run: |
          npx jest --config apps/rashpod-api/jest.config.ts test/communications.service.spec.ts --runInBand
          npx jest --config apps/rashpod-api/jest.config.ts test/platform-hardening.spec.ts --runInBand

      - name: Focused worker tests
        run: |
          npx jest --config apps/rashpod-worker/jest.config.ts src/jobs/telegram-handler.spec.ts --runInBand
          npx jest --config apps/rashpod-worker/jest.config.ts src/runtime-config.spec.ts --runInBand

      - name: Build API
        run: npm run build -w @rashpod/api

      - name: Build worker
        run: npm run build -w @rashpod/worker

      - name: Build dashboard
        run: npm run build -w @rashpod/dashboard

      - name: Build storefront
        run: npm run build -w @rashpod/web
