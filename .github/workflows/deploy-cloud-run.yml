name: Cloud Run Deployment Foundation

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      deploy:
        description: Actually deploy to Cloud Run
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      REGION: ${{ vars.GCP_REGION || 'us-central1' }}
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      ARTIFACT_REPO: ${{ vars.ARTIFACT_REPO || 'rashpod' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          test -n "$PROJECT_ID" || (echo "Set repository variable GCP_PROJECT_ID" && exit 1)
          test -n "${{ vars.WIF_PROVIDER }}" || (echo "Set repository variable WIF_PROVIDER" && exit 1)
          test -n "${{ vars.DEPLOY_SERVICE_ACCOUNT }}" || (echo "Set repository variable DEPLOY_SERVICE_ACCOUNT" && exit 1)

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet

      - name: Build images
        run: |
          docker build -f apps/rashpod-api/Dockerfile -t "$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REPO/rashpod-api:${{ github.sha }}" .
          docker build -f apps/rashpod-worker/Dockerfile -t "$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REPO/rashpod-worker:${{ github.sha }}" .
          docker build -f apps/rashpod-dashboard/Dockerfile --build-arg NEXT_PUBLIC_API_URL=${{ vars.API_URL }} --build-arg NEXT_PUBLIC_DASHBOARD_URL=${{ vars.DASHBOARD_URL }} --build-arg NEXT_PUBLIC_WEB_URL=${{ vars.WEB_URL }} -t "$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REPO/rashpod-dashboard:${{ github.sha }}" .
          docker build -f apps/rashpod-web/Dockerfile --build-arg NEXT_PUBLIC_API_URL=${{ vars.API_URL }} --build-arg NEXT_PUBLIC_DASHBOARD_URL=${{ vars.DASHBOARD_URL }} --build-arg NEXT_PUBLIC_WEB_URL=${{ vars.WEB_URL }} -t "$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REPO/rashpod-web:${{ github.sha }}" .

      - name: Push images
        if: inputs.deploy == true
        run: |
          docker push "$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REPO/rashpod-api:${{ github.sha }}"
          docker push "$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REPO/rashpod-worker:${{ github.sha }}"
          docker push "$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REPO/rashpod-dashboard:${{ github.sha }}"
          docker push "$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REPO/rashpod-web:${{ github.sha }}"

      - name: Deploy reminder
        if: inputs.deploy != true
        run: echo "Images built only. Re-run with deploy=true to push and deploy with the documented Cloud Run commands."
