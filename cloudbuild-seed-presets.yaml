substitutions:
  _REGION: us-central1
  _REPO: rashpod
  _PROJECT: rashpod-production

# Idempotent placement-preset upsert for production.
#
# Usage (after rashpod-api:latest is built):
#   gcloud builds submit --config cloudbuild-seed-presets.yaml --no-source --project=rashpod-production
#
# Required secrets in Secret Manager: DATABASE_URL.

steps:
  - id: run-seed-presets
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud run jobs deploy rashpod-seed-presets \
          --region=${_REGION} \
          --image=${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/rashpod-api:latest \
          --set-cloudsql-instances=${_PROJECT}:${_REGION}:rashpod-db \
          --set-secrets=DATABASE_URL=DATABASE_URL:latest \
          --set-env-vars=NODE_ENV=production \
          --command=sh \
          --args=-c,"npx tsx prisma/seed-placement-presets.ts" \
          --max-retries=0 \
          --task-timeout=10m \
          --memory=512Mi
        gcloud run jobs execute rashpod-seed-presets --region=${_REGION} --wait

options:
  logging: CLOUD_LOGGING_ONLY
